<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NOAH Mini Market ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>

    <style>

        html {
            scroll-behavior: smooth;
        }

        * {
            transition-property: background-color, color, transform, box-shadow, border-color;
            transition-duration: 180ms;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        .nav-item:hover {
            transform: translateX(4px);
        }

        .nav-icon {
            transition: transform 180ms ease;
        }

        .nav-item:hover .nav-icon {
            transform: scale(1.08);
        }

    </style>

</head>

<body class="bg-[#f8fafc] text-slate-800 antialiased">

<div class="min-h-screen flex">

    <!-- MOBILE OVERLAY -->
    <div id="overlay"
         class="fixed inset-0 bg-black/40 hidden lg:hidden z-40"
         onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar"
           class="fixed lg:static z-50 transform -translate-x-full lg:translate-x-0
                  transition-transform duration-300
                  w-72 h-full lg:h-auto flex flex-col bg-slate-900 text-white shadow-2xl">

        <!-- Brand -->
        <div class="px-7 py-7 border-b border-slate-800">

            <div class="flex items-center gap-4">

                <div class="w-11 h-11 rounded-xl bg-brand-600 flex items-center justify-center font-bold text-white shadow-lg">
                    N
                </div>

                <div>

                    <h1 class="text-xl font-bold tracking-tight">
                        NOAH ERP
                    </h1>

                    <p class="text-xs text-slate-400 mt-1">
                        Mini Market Management
                    </p>

                </div>

            </div>

        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-4 space-y-2">

            <a href="{% url 'dashboard' %}"
               class="nav-item group flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-300 hover:bg-slate-800 hover:text-white relative
               {% if request.resolver_match.url_name == 'dashboard' %}bg-slate-800 text-white shadow-lg{% endif %}">
                <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-brand-500
                {% if request.resolver_match.url_name != 'dashboard' %}opacity-0{% endif %}"></span>

                <i data-lucide="layout-dashboard" class="w-5 h-5 nav-icon"></i>
                <span>Dashboard</span>
            </a>

            <a href="{% url 'business_reports' %}"
               class="nav-item group flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-300 hover:bg-slate-800 hover:text-white relative
               {% if request.resolver_match.url_name == 'business_reports' %}bg-slate-800 text-white shadow-lg{% endif %}">
                <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-brand-500
                {% if request.resolver_match.url_name != 'business_reports' %}opacity-0{% endif %}"></span>

                <i data-lucide="bar-chart-3" class="w-5 h-5 nav-icon"></i>
                <span>Analytics</span>
            </a>

            <a href="{% url 'product_list' %}"
               class="nav-item group flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-300 hover:bg-slate-800 hover:text-white relative
               {% if request.resolver_match.url_name == 'product_list' %}bg-slate-800 text-white shadow-lg{% endif %}">
                <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-brand-500
                {% if request.resolver_match.url_name != 'product_list' %}opacity-0{% endif %}"></span>

                <i data-lucide="package" class="w-5 h-5 nav-icon"></i>
                <span>Inventory</span>
            </a>

            <a href="{% url 'sales_manager' %}"
               class="nav-item group flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-300 hover:bg-slate-800 hover:text-white relative
               {% if request.resolver_match.url_name == 'sales_manager' %}bg-slate-800 text-white shadow-lg{% endif %}">
                <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-brand-500
                {% if request.resolver_match.url_name != 'sales_manager' %}opacity-0{% endif %}"></span>

                <i data-lucide="shopping-cart" class="w-5 h-5 nav-icon"></i>
                <span>Sales POS</span>
            </a>

            <a href="{% url 'purchase_list' %}"
               class="nav-item group flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-300 hover:bg-slate-800 hover:text-white relative
               {% if request.resolver_match.url_name == 'purchase_list' %}bg-slate-800 text-white shadow-lg{% endif %}">
                <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-brand-500
                {% if request.resolver_match.url_name != 'purchase_list' %}opacity-0{% endif %}"></span>

                <i data-lucide="truck" class="w-5 h-5 nav-icon"></i>
                <span>Purchases</span>
            </a>

            <a href="{% url 'ledger_list' %}"
               class="nav-item group flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-300 hover:bg-slate-800 hover:text-white relative
               {% if request.resolver_match.url_name == 'ledger_list' %}bg-slate-800 text-white shadow-lg{% endif %}">
                <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-brand-500
                {% if request.resolver_match.url_name != 'ledger_list' %}opacity-0{% endif %}"></span>

                <i data-lucide="wallet" class="w-5 h-5 nav-icon"></i>
                <span>Company Vault</span>
            </a>

        </nav>

        <!-- Footer -->
        <div class="border-t border-slate-800 p-6">
            <div class="rounded-2xl bg-slate-800/60 p-4 text-center">
                <p class="text-xs text-slate-400">Developed by</p>
                <p class="text-sm font-semibold text-slate-200 mt-1">Wendwosen</p>
            </div>
        </div>

    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col min-w-0">

        <!-- HEADER -->
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-xl border-b border-slate-200/80">

            <div class="h-16 px-6 lg:px-8 flex items-center justify-between">

                <!-- HAMBURGER -->
                <button class="lg:hidden text-slate-700"
                        onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>

                <div>
                    <h2 class="font-semibold text-slate-900">
                        NOAH Mini Market ERP
                    </h2>
                    <p class="hidden md:block text-xs text-slate-500 mt-0.5">
                        Business Management Platform
                    </p>
                </div>

                <div class="w-10 h-10 rounded-xl bg-brand-600 text-white flex items-center justify-center font-semibold shadow-md">
                    N
                </div>

            </div>

        </header>

        <!-- CONTENT -->
        <main class="flex-1">
            <div class="max-w-[1800px] mx-auto p-4 md:p-6 lg:p-8">

                {% block content %}{% endblock %}

            </div>
        </main>

    </div>

</div>

<script>
lucide.createIcons();

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {
    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
}
</script>

</body>
</html>
