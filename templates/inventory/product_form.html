{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">{{ action }} Product</h1>
            <p class="text-slate-500 mt-1">Create and manage inventory products.</p>
        </div>
        <div class="flex gap-3">
            <a href="{% url 'product_list' %}" class="px-4 py-3 bg-white border border-slate-200 rounded-xl hover:bg-slate-50">Inventory Catalog</a>
            <a href="{% url 'category_create' %}" class="px-4 py-3 bg-brand-600 text-white rounded-xl hover:bg-brand-700">Add Category</a>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-200">
            <h2 class="font-semibold text-lg">Product Information</h2>
        </div>

        <form method="POST" enctype="multipart/form-data" class="p-6 space-y-6" id="productForm">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="pt-4 border-t border-slate-200 flex justify-end">
                <button type="submit" class="px-8 py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-semibold transition">
                    Save Product
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.getElementById('productForm');
        
        // 1. Add border and styling to all inputs
        const inputs = form.querySelectorAll('input:not([type="hidden"]), textarea, select');
        inputs.forEach(input => {
            input.classList.add('w-full', 'border', 'border-slate-300', 'rounded-lg', 'p-2', 'focus:ring-2', 'focus:ring-brand-500', 'outline-none');
        });

        // 2. Align description height with other inputs
        const descField = form.querySelector('textarea[name="description"]');
        if (descField) {
            // Remove hardcoded height to match standard input padding
            descField.style.minHeight = 'auto'; 
            descField.style.height = '42px'; // Adjust this to match your specific input height
            descField.style.overflow = 'hidden'; 
            descField.style.resize = 'vertical'; // Keeps it clean but allows manual resize if needed
            
            descField.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }
    });
</script>

{% endblock %}
