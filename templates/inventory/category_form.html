{% extends 'base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <div class="mb-6">
        <a href="{% url 'product_create' %}"
           class="text-brand-600 hover:text-brand-700 font-medium">
           ← Back to Product Creation
        </a>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

        <div class="px-6 py-5 border-b border-slate-200">
            <h1 class="text-2xl font-bold text-slate-900">
                Add Product Category
            </h1>
            <p class="text-slate-500 mt-1">
                Create a new inventory category.
            </p>
        </div>

        <form method="POST" class="p-6">
            {% csrf_token %}
            <div class="space-y-5">
                {{ form.as_p }}
            </div>
            <div class="mt-8 flex justify-end">
                <button
                    type="submit"
                    class="px-6 py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-medium transition"
                >
                    Save Category
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Targets the input field with the name 'name'
        const nameField = document.querySelector('input[name="name"]');
        if (nameField) {
            nameField.classList.add('border', 'border-slate-400', 'rounded-lg', 'p-2');
        }
    });
</script>

{% endblock %}
